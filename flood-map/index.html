<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Flood Events</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>html,body,#map{height:100%;margin:0;padding:0}#map{height:95vh}</style>
</head>
<body>
  <h3 style="margin:6px">Global flood events (from floods.csv)</h3>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const map = L.map('map').setView([20,0], 2);
    var tileUrl = 'https://' + '{s}' + '.tile.openstreetmap.org/' + '{z}' + '/' + '{x}' + '/' + '{y}' + '.png';
    L.tileLayer(tileUrl,{
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function safeNum(v){return v===''||v===null?NaN:Number(v)}

    Papa.parse('/floods.csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        results.data.forEach(function(r){
          var lon = safeNum(r.long || r.Long || r.longitude || r.lng);
          var lat = safeNum(r.lat || r.Lat || r.latitude || r.lat);
          if (!isNaN(lat) && !isNaN(lon)){
            var severity = safeNum(r.Severity) || safeNum(r.severity) || 1;
            var radius = Math.max(4, Math.min(20, severity*6));
            var marker = L.circleMarker([lat, lon], {radius: radius, color:'#1f78b4', fillOpacity:0.6}).addTo(map);
            var popup = '<b>' + (r.Country || r.country || '') + '</b><br/>' + (r.Began||r.began||'') + ' to ' + (r.Ended||r.ended||'') + '<br/>Cause: ' + (r.MainCause||r.maincause||'') + '<br/>Deaths: ' + (r.Dead||r.dead||0);
            marker.bindPopup(popup);
          }
        });
      },
      error: function(err){
        console.error('Failed to load CSV', err);
        alert('Failed to load floods.csv: '+err);
      }
    });
  </script>
</body>
</html>
